name: Deploy Inove Prime

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. BUILD no GitHub Actions ──────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar projeto e fazer build
        run: |
          mkdir -p /tmp/build-project

          cp -r "SISTEMA-GESTAO-INOVE/0 - INOVE-PRIME/inove-prime/." /tmp/build-project/
          cp -rf SISTEMA-GESTAO-INOVE/src/app/.        /tmp/build-project/app/
          cp -rf SISTEMA-GESTAO-INOVE/src/components/. /tmp/build-project/components/
          mkdir -p /tmp/build-project/lib
          cp -rf SISTEMA-GESTAO-INOVE/src/lib/.        /tmp/build-project/lib/ 2>/dev/null || true
          cp -f  SISTEMA-GESTAO-INOVE/src/middleware.ts   /tmp/build-project/middleware.ts
          cp -f  SISTEMA-GESTAO-INOVE/src/next.config.ts  /tmp/build-project/next.config.ts
          cp -f  SISTEMA-GESTAO-INOVE/src/package.json    /tmp/build-project/package.json

          cd /tmp/build-project
          npm install --legacy-peer-deps
          npm run build
          echo "=== Build concluído ==="

      # ── 2. Empacotar standalone ──────────────────────────────────────────────
      - name: Empacotar artefato standalone
        run: |
          cd /tmp/build-project
          cp -r .next/static  .next/standalone/.next/static
          cp -r public        .next/standalone/public
          tar -czf "$GITHUB_WORKSPACE/inove-deploy.tar.gz" -C .next/standalone .
          echo "Tamanho: $(du -sh $GITHUB_WORKSPACE/inove-deploy.tar.gz | cut -f1)"

      # ── 3. Preparar diretório de destino (app ainda rodando) ────────────────
      - name: Preparar diretório next no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          command_timeout: 1m
          script: |
            # Limpa apenas o staging — app corrente continua no ar
            rm -rf /var/www/inove-prime-next
            mkdir -p /var/www/inove-prime-next
            echo "=== Staging pronto — app continua rodando ==="

      # ── 4. Enviar tarball (app ainda rodando) ────────────────────────────────
      - name: Enviar build via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          source: inove-deploy.tar.gz
          target: /tmp/

      # ── 5. Extrair + swap atômico + health check (downtime ~3s) ─────────────
      - name: Extrair, swap e verificar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          command_timeout: 3m
          script: |
            set -e

            # ── Extrair no staging (app ainda no ar) ──
            echo "=== Extraindo no staging ==="
            TARBALL=$(find /tmp -name "inove-deploy.tar.gz" | head -1)
            [ -f "$TARBALL" ] || { echo "ERRO: tarball não encontrado"; exit 1; }
            tar -xzf "$TARBALL" -C /var/www/inove-prime-next
            echo '{"apps":[{"name":"inove-prime","script":"./server.js","cwd":"/var/www/inove-prime","env":{"PORT":3001,"NODE_ENV":"production","HOSTNAME":"0.0.0.0"}}]}' \
              > /var/www/inove-prime-next/ecosystem.config.json
            echo "Staging pronto: $(du -sh /var/www/inove-prime-next | cut -f1)"

            # ── SWAP ATÔMICO (~3 segundos de downtime) ──────────────────────
            echo "=== Iniciando swap ==="
            pm2 stop inove-prime 2>/dev/null || true

            # Manter versão anterior como backup (rollback rápido)
            rm -rf /var/www/inove-prime-old
            [ -d /var/www/inove-prime ] && mv /var/www/inove-prime /var/www/inove-prime-old

            # Ativar nova versão
            mv /var/www/inove-prime-next /var/www/inove-prime

            # Iniciar PM2 com nova versão
            pm2 delete inove-prime 2>/dev/null || true
            pm2 start /var/www/inove-prime/ecosystem.config.json
            pm2 save --force
            echo "=== App reiniciado ==="

            # ── Health check ─────────────────────────────────────────────────
            echo "=== Aguardando app subir ==="
            sleep 10

            if curl -sfL http://localhost:3001 > /dev/null 2>&1; then
              echo "=== DEPLOY OK — app respondendo ==="
              # Limpa backup após confirmação
              rm -rf /var/www/inove-prime-old
            else
              echo "=== FALHA NO HEALTH CHECK — iniciando rollback ==="
              pm2 stop inove-prime 2>/dev/null || true
              rm -rf /var/www/inove-prime
              mv /var/www/inove-prime-old /var/www/inove-prime
              pm2 start /var/www/inove-prime/ecosystem.config.json
              pm2 save --force
              echo "=== ROLLBACK CONCLUÍDO — versão anterior restaurada ==="
              pm2 logs inove-prime --lines 30 --nostream
              exit 1
            fi

            echo "=== DEPLOY CONCLUÍDO COM SUCESSO ==="
            pm2 list
