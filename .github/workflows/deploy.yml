name: Deploy Inove Prime

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. BUILD no GitHub Actions (RAM ilimitada) ──
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar projeto e fazer build
        run: |
          # Criar dir de build
          mkdir -p /tmp/build-project

          # Copiar base completa do projeto (package.json, configs, etc.)
          cp -r "SISTEMA-GESTAO-INOVE/0 - INOVE-PRIME/inove-prime/." /tmp/build-project/

          # Sobrepor com src/ (versão mais recente de app/, components/, etc.)
          cp -rf SISTEMA-GESTAO-INOVE/src/app/.        /tmp/build-project/app/
          cp -rf SISTEMA-GESTAO-INOVE/src/components/. /tmp/build-project/components/
          mkdir -p /tmp/build-project/lib
          cp -rf SISTEMA-GESTAO-INOVE/src/lib/.        /tmp/build-project/lib/ 2>/dev/null || true
          cp -f  SISTEMA-GESTAO-INOVE/src/middleware.ts   /tmp/build-project/middleware.ts
          cp -f  SISTEMA-GESTAO-INOVE/src/next.config.ts  /tmp/build-project/next.config.ts
          cp -f  SISTEMA-GESTAO-INOVE/src/package.json    /tmp/build-project/package.json

          cd /tmp/build-project

          # Usar npm install (não ci) — instala binários nativos corretos para Linux
          npm install --legacy-peer-deps

          # Build (TypeScript e ESLint já ignorados no next.config.ts)
          # output: "standalone" gera .next/standalone/server.js autocontido
          npm run build
          echo "=== Build concluído ==="

      # ── 2. Empacotar standalone (autocontido — sem npm no servidor) ──
      - name: Empacotar artefato standalone
        run: |
          cd /tmp/build-project

          # Copiar arquivos estáticos e public DENTRO do standalone (obrigatório)
          cp -r .next/static   .next/standalone/.next/static
          cp -r public         .next/standalone/public

          # Empacotar standalone — salvar NO WORKSPACE (scp-action não lê /tmp)
          tar -czf "$GITHUB_WORKSPACE/inove-deploy.tar.gz" -C .next/standalone .
          echo "Tamanho: $(du -sh $GITHUB_WORKSPACE/inove-deploy.tar.gz | cut -f1)"

      # ── 3. Parar PM2 e limpar diretório ──
      - name: Parar PM2 no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          command_timeout: 1m
          script: |
            pm2 stop inove-prime 2>/dev/null || true
            rm -rf /var/www/inove-prime
            mkdir -p /var/www/inove-prime

      # ── 4. Enviar tarball ──
      - name: Enviar build via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          source: inove-deploy.tar.gz
          target: /tmp/

      # ── 5. Extrair e reiniciar — sem npm, sem node_modules extra ──
      - name: Extrair e reiniciar PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          command_timeout: 3m
          script: |
            echo "=== Localizando tarball ==="
            TARBALL=$(find /tmp -name "inove-deploy.tar.gz" 2>/dev/null | head -1)
            echo "Tarball: $TARBALL"
            ls -lh "$TARBALL" || { echo "ERRO: tarball nao encontrado!"; find /tmp -ls 2>/dev/null | head -20; exit 1; }

            echo "=== Extraindo standalone em /var/www/inove-prime ==="
            tar -xzf "$TARBALL" -C /var/www/inove-prime
            echo "Conteudo extraido:"
            ls -la /var/www/inove-prime/

            echo "=== Reiniciando PM2 ==="
            pm2 delete inove-prime 2>/dev/null || true

            # export garante que PORT chegue ao processo filho via pm2
            export PORT=3001
            pm2 start /var/www/inove-prime/server.js --name "inove-prime"
            pm2 save --force

            echo "=== Status PM2 ==="
            pm2 list

            echo "=== Aguardando app subir ==="
            sleep 12

            echo "=== Portas em uso ==="
            ss -tlnp | grep -E "3001|3000" || true

            curl -sfL http://localhost:3001 > /dev/null \
              && echo "=== APP OK ===" \
              || { echo "=== FALHA: logs PM2 ==="; pm2 logs inove-prime --lines 50 --nostream; exit 1; }
            echo "=== DEPLOY CONCLUIDO ==="
