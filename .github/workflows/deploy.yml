name: Deploy Inove Prime

on:
  push:
    branches: [main]

# Garante que só 1 deploy roda por vez — cancela o anterior se houver novo push
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          command_timeout: 20m
          script: |
            cd /root/inove-deploy
            git pull origin main
            bash b
