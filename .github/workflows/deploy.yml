name: Deploy Inove Prime

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 1. BUILD no GitHub Actions (RAM ilimitada) ──
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Preparar projeto e fazer build
        run: |
          # Criar dir de build
          mkdir -p /tmp/build-project

          # Copiar base completa do projeto (package.json, configs, etc.)
          cp -r "SISTEMA-GESTAO-INOVE/0 - INOVE-PRIME/inove-prime/." /tmp/build-project/

          # Sobrepor com src/ (versão mais recente de app/, components/, etc.)
          cp -rf SISTEMA-GESTAO-INOVE/src/app/.        /tmp/build-project/app/
          cp -rf SISTEMA-GESTAO-INOVE/src/components/. /tmp/build-project/components/
          mkdir -p /tmp/build-project/lib
          cp -rf SISTEMA-GESTAO-INOVE/src/lib/.        /tmp/build-project/lib/ 2>/dev/null || true
          cp -f  SISTEMA-GESTAO-INOVE/src/middleware.ts  /tmp/build-project/middleware.ts
          cp -f  SISTEMA-GESTAO-INOVE/src/next.config.ts /tmp/build-project/next.config.ts

          cd /tmp/build-project

          # Usar npm install (não ci) — instala binários nativos corretos para Linux
          npm install --legacy-peer-deps

          # Build (TypeScript e ESLint já ignorados no next.config.ts)
          npm run build
          echo "=== Build concluído ==="

      # ── 2. Empacotar apenas o necessário (.next + public) ──
      - name: Empacotar artefato
        run: |
          cd /tmp/build-project
          tar -czf /tmp/inove-deploy.tar.gz .next public
          echo "Tamanho: $(du -sh /tmp/inove-deploy.tar.gz | cut -f1)"

      # ── 3. Parar PM2 ──
      - name: Parar PM2 no VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          command_timeout: 1m
          script: |
            pm2 stop inove-prime 2>/dev/null || true
            mkdir -p /var/www/inove-prime

      # ── 4. Enviar tarball ──
      - name: Enviar build via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          source: /tmp/inove-deploy.tar.gz
          target: /tmp/

      # ── 5. Extrair e reiniciar — node_modules fica no lugar ──
      - name: Extrair e reiniciar PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 129.121.39.150
          username: root
          password: ${{ secrets.VPS_PASS }}
          port: 22022
          command_timeout: 3m
          script: |
            echo "=== Extraindo build em /var/www/inove-prime ==="
            tar -xzf /tmp/inove-deploy.tar.gz -C /var/www/inove-prime

            echo "=== Reiniciando PM2 ==="
            pm2 delete inove-prime 2>/dev/null || true
            pm2 start npm --name "inove-prime" --cwd /var/www/inove-prime -- start
            pm2 save

            echo "=== Aguardando app subir ==="
            sleep 12
            curl -sfL http://localhost:3001 > /dev/null \
              && echo "=== APP OK ===" \
              || { pm2 logs inove-prime --lines 30 --nostream; exit 1; }
            echo "=== DEPLOY CONCLUIDO ==="
